<title>Falcão Rastreamento Veicular — Monitoramento em tempo real</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#04070f;
    --bg-navy:#070d20;
    --bg-panel:#0a1330;
    --bg-panel-2:#0d1a42;
    --blue-900:#071842;
    --blue-700:#0c3aa6;
    --blue-600:#154fd1;
    --blue-500:#2f6bff;
    --blue-400:#5b8cff;
    --cyan-300:#8fd3ff;
    --cyan-100:#dcf0ff;
    --white:#ffffff;
    --ice:#eaf2ff;
    --muted:#93a4d1;
    --line:rgba(143,211,255,0.14);
    --shadow-glow:0 0 60px rgba(47,107,255,0.35);
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:10px;
    --ff-display:'Rajdhani', sans-serif;
    --ff-body:'Manrope', sans-serif;
    --ff-mono:'Space Mono', monospace;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--ff-body);
    background:var(--bg-deep);
    color:var(--ice);
    overflow-x:hidden;
    line-height:1.5;
  }
  img{max-width:100%; display:block;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  button{font-family:inherit; cursor:pointer;}

  .container{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:0 24px;
  }

  ::selection{background:var(--blue-500); color:var(--white);}

  /* Background texture shared across dark sections */
  .hex-bg{
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(47,107,255,0.16), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(91,140,255,0.14), transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(12,58,166,0.25), transparent 50%);
    pointer-events:none;
  }

  /* ============ HEADER ============ */
  header{
    position:sticky; top:0; z-index:100;
    background:rgba(4,7,15,0.82);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .nav-wrap{
    display:flex; align-items:center; justify-content:space-between;
    height:78px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand img{width:44px; height:44px; border-radius:50%;}
  .brand-name{
    font-family:var(--ff-display); font-weight:700; font-size:1.35rem;
    letter-spacing:0.04em; color:var(--white);
    display:flex; flex-direction:column; line-height:1;
  }
  .brand-name span{
    font-family:var(--ff-mono); font-size:0.55rem; letter-spacing:0.18em;
    color:var(--cyan-300); font-weight:400; margin-top:4px;
  }
  nav.links{display:flex; gap:36px;}
  nav.links a{
    font-size:0.92rem; font-weight:600; color:var(--muted);
    position:relative; transition:color .2s;
  }
  nav.links a:hover{color:var(--white);}
  nav.links a::after{
    content:''; position:absolute; left:0; bottom:-6px; height:2px; width:0;
    background:var(--blue-500); transition:width .25s;
  }
  nav.links a:hover::after{width:100%;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:13px 26px; border-radius:999px; font-weight:700; font-size:0.92rem;
    border:none; transition:transform .18s ease, box-shadow .18s ease, background .18s;
    white-space:nowrap;
  }
  .btn-primary{
    background:linear-gradient(135deg, var(--blue-400), var(--blue-600));
    color:var(--white);
    box-shadow:0 8px 24px rgba(47,107,255,0.45);
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 32px rgba(47,107,255,0.6);}
  .btn-ghost{
    background:transparent; color:var(--ice);
    border:1.5px solid rgba(234,242,255,0.35);
  }
  .btn-ghost:hover{border-color:var(--cyan-300); color:var(--cyan-300);}
  .btn-block{width:100%;}
  .menu-toggle{display:none; background:none; border:none;}
  .menu-toggle span{
    display:block; width:26px; height:2px; background:var(--white); margin:6px 0; border-radius:2px;
  }

  /* Keep the original full page content */
</style>
</head>
